name: Daily Tech Pulse

on:
  schedule:
    # 每日 UTC 23:00 = 台灣 07:00 執行
    - cron: '0 23 * * *'
  workflow_dispatch: {} # 允許手動觸發

permissions:
  contents: write

jobs:
  pulse:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: 20

      - name: 產生當日報告
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # 若要啟用 Claude 摘要，於 repo Secrets 設定 ANTHROPIC_API_KEY
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: npm run pulse

      - name: 自動 commit
        run: |
          git config user.name "dq042000"
          git config user.email "7939291+dq042000@users.noreply.github.com"
          git add reports README.md
          if git diff --staged --quiet; then
            echo "今日無變更"
          else
            git commit -m "chore: 科技脈動報告 $(TZ=Asia/Taipei date +%F)"
            git push
          fi
